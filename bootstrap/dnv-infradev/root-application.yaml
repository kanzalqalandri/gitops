apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dnv-infradev-root-app
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  source:
    repoURL: https://github.com/kanzalqalandri/gitops.git
    targetRevision: main
    path: argo-apps/dnv-infradev
    directory:
      recurse: true
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
